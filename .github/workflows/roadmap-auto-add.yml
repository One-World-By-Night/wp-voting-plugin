name: Roadmap Auto-Add

on:
  issues:
    types: [labeled]

jobs:
  add-to-roadmap:
    if: >-
      contains(github.event.issue.labels.*.name, 'roadmap') &&
      contains(github.event.issue.labels.*.name, 'customer-visible') &&
      (contains(github.event.issue.labels.*.name, 'feature') || contains(github.event.issue.labels.*.name, 'bug'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1
        with:
          project-url: https://github.com/orgs/One-World-By-Night/projects/4
          github-token: ${{ secrets.ROADMAP_TOKEN }}
